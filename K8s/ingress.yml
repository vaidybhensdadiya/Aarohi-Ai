apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aarohi-ingress
  namespace: aarohi-ai
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "50m" # Supports larger payloads for your ML model inputs
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: aarohi-app-service  # Matches your exact verified service name
            port:
              number: 5000            # Matches your verified service port

