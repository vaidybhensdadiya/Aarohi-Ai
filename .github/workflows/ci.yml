name: DevSecOps - End to End Pipeline

on:
  push:
    branches:
      - KrishV
  pull_request:
    branches:
      - KrishV

permissions:
  contents: write
  security-events: write
  id-token: write

env:
  AWS_REGION: us-west-1
  ECR_REPOSITORY: aarohi-ai-web-app

jobs:
  #############################################################################
  # STAGE 1: Code Quality & DevSecOps (Originally ci.yml)
  #############################################################################
  security_ci:
    name: Code Security & Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Project Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Install Security Tools
        run: |
          pip install pip-audit safety

      - name: Scan Python Dependencies (Safety)
        env:
          SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}
        run: safety check --full-report
        continue-on-error: true # Prevents pipeline breakage if token isn't configured yet

      - name: Scan for Secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan Python Dependencies (pip-audit)
        run: |
          pip-audit

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Scan Terraform & Kubernetes (Checkov)
        uses: bridgecrewio/checkov-action@master
        with:
          
          directory: .
          framework: terraform,kubernetes
          quiet: true
          soft_fail: false

      - name: Trivy Filesystem Scan
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
           
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          

      - name: Pipeline Status
        run: |
          echo "========================================="
          echo "CI Security Pipeline Completed"
          echo "Repository is ready for Docker Build."
          echo "========================================="

  #############################################################################
  # STAGE 2: Image Build, Scan & Push (Originally image.yml)
  #############################################################################
  image_build:
    name: Image Build, Scan & Push
    runs-on: ubuntu-latest
    needs: security_ci # <-- Sequence Link: Must execute after CI passes
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $REGISTRY/$ECR_REPOSITORY:latest .

      - name: Scan Docker Image (Trivy)
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
           
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          output-file: sbom.spdx.json
          format: spdx-json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

      - name: Push Docker Images
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPOSITORY:latest

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "$COSIGN_PRIVATE_KEY" > cosign.key
          cosign sign \
            --key cosign.key \
            $REGISTRY/$ECR_REPOSITORY:${{ github.sha }} \
            -y

      - name: Build Complete
        run: |
          echo "========================================="
          echo "Docker Build Completed"
          echo "Image Scanned Successfully"
          echo "SBOM Generated"
          echo "Image Signed"
          echo "Image Pushed to Amazon ECR"
          echo "========================================="

  #############################################################################
  # STAGE 3: GitOps Deployment (Originally deploy.yml)
  #############################################################################
  deployment:
    name: GitOps Deployment
    runs-on: ubuntu-latest
    needs: image_build # <-- Sequence Link: Must execute after image compilation passes
    env:
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: KrishV
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com
          sudo chmod +x /usr/local/bin/yq
          yq --version

