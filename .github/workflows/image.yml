name: Image Build, Scan & Push

on:
  workflow_run:
    workflows: ["CI - Code Quality & DevSecOps"]
    types:
      - completed

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-west-1
  ECR_REPOSITORY: aarohi-ai-web-app

jobs:
  image:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:

      #################################################
      # Checkout
      #################################################
      - name: Checkout Repository
        uses: actions/checkout@v4

      #################################################
      # Configure AWS Credentials
      #################################################
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      #################################################
      # Login to Amazon ECR
      #################################################
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      #################################################
      # Setup Docker Buildx
      #################################################
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      #################################################
      # Build Docker Image
      #################################################
      - name: Build Docker Image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $REGISTRY/$ECR_REPOSITORY:latest .

      #################################################
      # Trivy Image Scan
      #################################################
      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library

      #################################################
      # Generate SBOM
      #################################################
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          output-file: sbom.spdx.json
          format: spdx-json

      #################################################
      # Upload SBOM
      #################################################
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

      #################################################
      # Push Docker Images
      #################################################
      - name: Push Docker Images
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPOSITORY:latest

      #################################################
      # Install Cosign
      #################################################
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      #################################################
      # Sign Docker Image
      #################################################
      - name: Sign Image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "$COSIGN_PRIVATE_KEY" > cosign.key

          cosign sign \
            --key cosign.key \
            $REGISTRY/$ECR_REPOSITORY:${{ github.sha }} \
            -y

      #################################################
      # Completed
      #################################################
      - name: Build Complete
        run: |
          echo "========================================="
          echo "Docker Build Completed"
          echo "Image Scanned Successfully"
          echo "SBOM Generated"
          echo "Image Signed"
          echo "Image Pushed to Amazon ECR"
          echo "========================================="
