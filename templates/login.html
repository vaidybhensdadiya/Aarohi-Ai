{% extends "base.html" %}
{% set hide_sidebar = True %}
{% block title %}Login - Aarohi AI{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card card">
        <h2 class="auth-title">Welcome back</h2>
        <p class="auth-subtitle">Sign in to Aarohi AI</p>

        <form id="loginForm" class="auth-form">
            <div class="form-group">
                <label class="form-label" for="email_id">Email</label>
                <input type="email" id="email_id" name="email_id" class="form-input" placeholder="your@email.com"
                    required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
            </div>
            <div id="loginError" class="form-error" style="display:none;"></div>
            <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>

        <p class="auth-footer">
            Don't have an account? <a href="{{ url_for('register_page') }}">Register</a>
        </p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
<script>
    document.getElementById('loginForm').addEventListener('submit', handleLogin);
</script>
{% endblock %}
